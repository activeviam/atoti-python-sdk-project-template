services:
  app:
    build: .
    depends_on:
      - aspire-dashboard
    environment:
      DATA_REFRESH_PERIOD:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://aspire-dashboard:18890
    healthcheck:
      start_period: 30s
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost/actuator/health/readiness').raise_for_status()"]
    ports:
      - "127.0.0.1::80"

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13.2.0
    environment:
      ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "127.0.0.1::18888" # UI
